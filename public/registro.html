<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — CSV Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #94a3b8; margin-bottom: 28px; }
        label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            margin-bottom: 18px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #2563eb; }
        button {
            width: 100%;
            padding: 11px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #334155; cursor: not-allowed; }
        .mensaje {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .error { background: #450a0a; border: 1px solid #991b1b; color: #fca5a5; }
        .success { background: #052e16; border: 1px solid #166534; color: #86efac; }
        .link { text-align: center; margin-top: 20px; font-size: 13px; color: #94a3b8; }
        .link a { color: #60a5fa; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h1>📊 CSV Manager</h1>
    <p class="subtitle">Crea tu cuenta para empezar</p>
    <div class="mensaje" id="mensaje"></div>
    <label for="nombre">Nombre completo</label>
    <input type="text" id="nombre" placeholder="Tu nombre" required>
    <label for="correo">Correo electrónico</label>
    <input type="email" id="correo" placeholder="tu@correo.com" required>
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
    <button id="btn" onclick="registrar()">Crear cuenta</button>
    <p class="link">¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a></p>
</div>

<script>
async function registrar() {
    const nombre = document.getElementById('nombre').value.trim();
    const correo = document.getElementById('correo').value.trim();
    const password = document.getElementById('password').value;
    const msgEl = document.getElementById('mensaje');
    const btn = document.getElementById('btn');

    msgEl.style.display = 'none';
    msgEl.className = 'mensaje';

    if (!nombre || !correo || !password) {
        msgEl.textContent = 'Completa todos los campos.';
        msgEl.classList.add('error');
        msgEl.style.display = 'block';
        return;
    }
    if (password.length < 6) {
        msgEl.textContent = 'La contraseña debe tener al menos 6 caracteres.';
        msgEl.classList.add('error');
        msgEl.style.display = 'block';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Registrando...';

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombre, correo, password })
        });

        const datos = await res.json();

        if (!res.ok) {
            msgEl.textContent = datos.mensaje;
            msgEl.classList.add('error');
            msgEl.style.display = 'block';
            return;
        }

        msgEl.textContent = '✅ Cuenta creada. Redirigiendo al login...';
        msgEl.classList.add('success');
        msgEl.style.display = 'block';

        setTimeout(() => window.location.href = '/login.html', 1800);

    } catch (e) {
        msgEl.textContent = 'Error de conexión con el servidor.';
        msgEl.classList.add('error');
        msgEl.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
    }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') registrar(); });
</script>
</body>
</html>
